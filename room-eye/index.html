<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ROOM:EYE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#000;
  display:flex;justify-content:center;align-items:center;
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  overflow:hidden;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
#wrap{position:relative;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}
#crt{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:10;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);
}
#dlg{
  display:none;position:absolute;bottom:0;left:0;right:0;z-index:20;
  background:rgba(4,1,1,0.97);border-top:1.5px solid #5c1515;
  padding:16px 18px 12px;min-height:130px;
  font-family:'Courier New',Courier,monospace;font-size:15px;color:#ccc;line-height:1.85;
  touch-action:none;
}
#dlg-text{min-height:70px;white-space:pre-wrap;}
#dlg-hint{text-align:right;font-size:11px;color:#7a2020;margin-top:6px;animation:bk 1.2s step-end infinite;}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
#fade{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;opacity:0;pointer-events:none;z-index:30;transition:opacity 0.75s;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="crt"></div>
  <div id="dlg">
    <div id="dlg-text"></div>
    <div id="dlg-hint">▼ 탭하여 계속</div>
  </div>
  <div id="fade"></div>
</div>
<script>
'use strict';
const GW=360,GH=640;
const cv=document.getElementById('c');
const g=cv.getContext('2d');
const wrap=document.getElementById('wrap');
const dlgEl=document.getElementById('dlg');
const dlgTextEl=document.getElementById('dlg-text');
const dlgHintEl=document.getElementById('dlg-hint');
const fadeEl=document.getElementById('fade');

function resize(){
  const s=Math.min(window.innerWidth/GW,window.innerHeight/GH);
  const w=Math.floor(GW*s),h=Math.floor(GH*s);
  cv.width=GW;cv.height=GH;
  cv.style.width=w+'px';cv.style.height=h+'px';
  wrap.style.width=w+'px';wrap.style.height=h+'px';
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',function(){setTimeout(resize,200);});

// ─── State ───────────────────────────────────────────────────
let scene='title',phase=0,invCount=0,dlgActive=false,frozen=false;
const P={x:180,y:490,tx:180,ty:490,moving:false,flip:false,wf:0,wt:0};
const PSPD=95,PREACH=62;
const SH={x:-300,y:450,active:false,spd:60};

// ─── Dialogue ────────────────────────────────────────────────
let DQ={lines:[],i:0,n:0,done:false,tim:null,cb:null};
function showDlg(lines,cb){
  if(!lines||!lines.length){if(cb)cb();return;}
  DQ={lines,i:0,n:0,done:false,tim:null,cb:cb||null};
  dlgActive=true;dlgEl.style.display='block';
  dlgHintEl.style.opacity='0';_typeNext();
}
function _typeNext(){
  const ln=DQ.lines[DQ.i];
  dlgTextEl.textContent='';DQ.n=0;DQ.done=false;
  clearInterval(DQ.tim);
  DQ.tim=setInterval(function(){
    DQ.n++;dlgTextEl.textContent=ln.slice(0,DQ.n);
    if(DQ.n>=ln.length){clearInterval(DQ.tim);DQ.done=true;dlgHintEl.style.opacity='1';}
  },46);
}
function advanceDlg(){
  if(!dlgActive)return;
  if(!DQ.done){
    clearInterval(DQ.tim);
    dlgTextEl.textContent=DQ.lines[DQ.i];
    DQ.n=DQ.lines[DQ.i].length;DQ.done=true;dlgHintEl.style.opacity='1';
    return;
  }
  DQ.i++;
  if(DQ.i<DQ.lines.length){dlgHintEl.style.opacity='0';_typeNext();}
  else{
    clearInterval(DQ.tim);dlgActive=false;dlgEl.style.display='none';
    var cb=DQ.cb;DQ={lines:[],i:0,n:0,done:false,tim:null,cb:null};
    if(cb)cb();
  }
}

// ─── Fade ─────────────────────────────────────────────────────
function fadeIn(cb){
  fadeEl.style.transition='opacity 0.75s';
  fadeEl.style.opacity='1';
  setTimeout(function(){if(cb)cb();},750);
}
function fadeOut(){
  fadeEl.style.transition='opacity 0.75s';
  fadeEl.style.opacity='0';
}

// ─── Room data ────────────────────────────────────────────────
var ROOMS=[
  {bg:'#100706',fl:'#140907',wl:'#0C0504',req:3,
   extra:[{x:118,y:162,w:44,h:44,vis:false},{x:244,y:175,w:44,h:44,vis:false}],
   objects:[
    {id:'eye1',x:50,y:185,w:54,h:54,type:'eye',used:false,
     lines:['누군가 보고 있다.','눈이 움직인 것 같다.']},
    {id:'carpet',x:130,y:415,w:100,h:44,type:'carpet',used:false,
     lines:['카펫에도 눈이 있다.','발 아래에서도 감시당하고 있다.']},
    {id:'window',x:260,y:200,w:52,h:65,type:'window',used:false,
     lines:['창문이 없는데 시선이 느껴진다.','어디선가 계속 보고 있다.']},
    {id:'tv1',x:158,y:268,w:58,h:42,type:'tv',used:false,
     lines:['꺼진 화면에 내가 비친다.','전원을 켤 수가 없다.']},
    {id:'door1',x:154,y:86,w:52,h:74,type:'door',used:false,isExit:true,reqC:3,
     lines:['문은 열리지 않는다.','아직 이 방을 다 보지 못했다.'],
     openLines:['문이 열린다.','. . .']}
  ]},
  {bg:'#0D0505',fl:'#110707',wl:'#090404',req:3,extra:[],
   objects:[
    {id:'eye2a',x:40,y:175,w:54,h:54,type:'eye',used:false,
     lines:['눈이 늘어난 것 같다.','익숙했던 것들이 낯설게 변한다.']},
    {id:'eye2b',x:270,y:185,w:54,h:54,type:'eye',used:false,
     lines:['그림 속 눈이 나를 따라본다.','착각일까.']},
    {id:'mirror',x:153,y:210,w:54,h:68,type:'mirror',used:false,
     lines:['거울에 내가 보인다.','그런데... 저게 정말 나인가.','조금 다른 것 같다.']},
    {id:'tv2',x:82,y:325,w:58,h:42,type:'tv',used:false,
     lines:['TV에서 잡음이 들린다.','채널을 바꿀 수 없다.']},
    {id:'door2',x:154,y:86,w:52,h:74,type:'door',used:false,isExit:true,reqC:3,
     lines:['아직 이 방을 다 조사하지 못했다.','무언가 더 살펴봐야 한다.'],
     openLines:['다음 방으로 넘어간다.','. . .']}
  ]},
  {bg:'#090404',fl:'#0C0505',wl:'#060202',req:1,extra:[],
   objects:[
    {id:'eye3a',x:34,y:150,w:54,h:54,type:'eye',used:false,
     lines:['벽 전체가 눈이다.','시선이 더 이상 멀리 있지 않다.']},
    {id:'eye3b',x:286,y:168,w:54,h:54,type:'eye',used:false,
     lines:['눈이 깜빡였다.','그것이 나를 향해 열렸다.']},
    {id:'eye3c',x:172,y:285,w:54,h:54,type:'eye',used:false,
     lines:['...','나를 보고 있다.']},
    {id:'door3',x:154,y:86,w:52,h:74,type:'door',used:false,isExit:true,reqC:0,
     lines:[],openLines:['저기다.','빨리 나가야 한다.']}
  ]}
];
var room=null;

function loadRoom(n){
  phase=n;invCount=0;frozen=false;
  SH.active=false;SH.x=-300;
  P.x=180;P.y=490;P.tx=180;P.ty=490;P.moving=false;
  if(n<ROOMS.length){
    room=JSON.parse(JSON.stringify(ROOMS[n]));
    scene='room';
  } else {
    startEnding();
  }
}

function d2(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}

function nearestObj(){
  if(!room)return null;
  var best=null,bd=PREACH;
  for(var i=0;i<room.objects.length;i++){
    var o=room.objects[i];
    if(o.used&&!o.isExit)continue;
    var dd=d2(P.x,P.y,o.x+o.w/2,o.y+o.h/2);
    if(dd<bd){bd=dd;best=o;}
  }
  return best;
}

function investigate(o){
  if(o.isExit){
    if(invCount<(o.reqC||0)){showDlg(o.lines);}
    else{showDlg(o.openLines||o.lines,function(){goNext();});}
    return;
  }
  o.used=true;invCount++;
  if(invCount>=room.req)phaseEvent();
  showDlg(o.lines);
}

function phaseEvent(){
  if(phase===0){
    if(room.extra)room.extra.forEach(function(e){e.vis=true;});
  } else if(phase===1){
    if(!room.furniture)room.furniture=[
      {x:260,y:348,w:44,h:84,ox:0,oy:0},
      {x:78,y:398,w:38,h:54,ox:0,oy:0},
      {x:44,y:282,w:30,h:62,ox:0,oy:0}
    ];
    room.furniture.forEach(function(f){
      f.ox+=(Math.random()-0.5)*28;
      f.oy+=(Math.random()-0.5)*14;
    });
  } else if(phase===2){
    SH.x=P.x+320;SH.y=P.y;SH.active=true;
  }
}

function goNext(){
  frozen=true;
  fadeIn(function(){loadRoom(phase+1);setTimeout(fadeOut,100);});
}

function shadowCatch(){
  SH.active=false;frozen=true;
  showDlg(['너도 결국 보여지고 싶었잖아.','...'],function(){
    fadeIn(function(){loadRoom(2);setTimeout(fadeOut,100);});
  });
}

// ─── Ending ───────────────────────────────────────────────────
var endStep=0,endT=0,mirA=0,eyeA=0,endDone=false;
function startEnding(){
  scene='ending';endStep=0;endT=0;mirA=0;eyeA=0;endDone=false;
  P.x=180;P.y=510;P.tx=180;P.ty=375;P.moving=true;P.flip=false;
}
function updateEnding(dt){
  endT+=dt;
  if(endStep===0){if(d2(P.x,P.y,180,375)<8){P.moving=false;endStep=1;endT=0;}}
  if(endStep===1&&endT>1.0){endStep=2;endT=0;}
  if(endStep===2){mirA=Math.min(1,endT/1.8);if(mirA>=1){endStep=3;endT=0;}}
  if(endStep===3){
    eyeA=Math.min(1,endT/1.2);
    if(eyeA>=1&&!endDone){
      endDone=true;endStep=4;
      setTimeout(function(){
        showDlg(
          ['거울 속 내가 웃고 있다.','나는 웃지 않았다.','모두가 나를 보고 있다.','이제야 모두가 날 봐준다.'],
          function(){
            setTimeout(function(){
              fadeIn(function(){scene='title';phase=0;setTimeout(fadeOut,100);});
            },1400);
          }
        );
      },600);
    }
  }
}

// ─── Game loop ────────────────────────────────────────────────
var lastT=0;
function tick(ts){
  var dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  if(scene==='room'||scene==='ending'){
    updatePlayer(dt);
    if(scene==='room'&&SH.active)updateShadow(dt);
    if(scene==='ending')updateEnding(dt);
  }
  draw();
  requestAnimationFrame(tick);
}
function updatePlayer(dt){
  if(frozen||!P.moving)return;
  var dx=P.tx-P.x,dy=P.ty-P.y,dd=Math.hypot(dx,dy);
  if(dd<5){P.moving=false;return;}
  var s=PSPD*dt;
  P.x+=dx/dd*Math.min(s,dd);P.y+=dy/dd*Math.min(s,dd);
  P.x=Math.max(18,Math.min(GW-18,P.x));
  P.y=Math.max(130,Math.min(GH-28,P.y));
  P.wt+=dt;if(P.wt>0.18){P.wf=(P.wf+1)%4;P.wt=0;}
}
function updateShadow(dt){
  var dx=P.x-SH.x,dy=P.y-SH.y,dd=Math.hypot(dx,dy);
  if(dd<24){shadowCatch();return;}
  SH.x+=dx/dd*SH.spd*dt;SH.y+=dy/dd*SH.spd*dt;
}

// ─── Input ────────────────────────────────────────────────────
function toGame(e){
  var r=cv.getBoundingClientRect();
  var sx=GW/r.width,sy=GH/r.height;
  var t=e.changedTouches?e.changedTouches[0]:e;
  return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
}
function onTap(gx,gy){
  if(scene==='title'){
    if(gx>100&&gx<260&&gy>345&&gy<410){
      fadeIn(function(){loadRoom(0);setTimeout(fadeOut,100);});
    }
    return;
  }
  if(dlgActive){advanceDlg();return;}
  if(scene==='room'&&!frozen){
    var o=nearestObj();
    if(o){investigate(o);return;}
    P.tx=gx;P.ty=gy;P.moving=true;P.flip=gx<P.x;
  }
}
cv.addEventListener('touchstart',function(e){
  e.preventDefault();var p=toGame(e);onTap(p.x,p.y);
},{passive:false});
cv.addEventListener('mousedown',function(e){
  var p=toGame(e);onTap(p.x,p.y);
});
dlgEl.addEventListener('touchstart',function(e){
  e.preventDefault();advanceDlg();
},{passive:false});
dlgEl.addEventListener('mousedown',function(){advanceDlg();});

// ─── Drawing ──────────────────────────────────────────────────
function eyeShape(x,y,w,h,closed){
  var mx=x+w/2,my=y+h/2,rx=w/2,ry=h/2.2;
  g.save();
  g.fillStyle='#c8b4a4';
  g.beginPath();g.ellipse(mx,my,rx,ry,0,0,Math.PI*2);g.fill();
  if(!closed){
    g.fillStyle='#4a0a0a';
    g.beginPath();g.ellipse(mx,my,rx*0.5,ry*0.68,0,0,Math.PI*2);g.fill();
    g.fillStyle='#040101';
    g.beginPath();g.ellipse(mx,my,rx*0.2,ry*0.32,0,0,Math.PI*2);g.fill();
    g.strokeStyle='rgba(160,40,40,0.35)';g.lineWidth=0.7;
    for(var i=0;i<5;i++){
      var a=i/5*Math.PI*2;
      g.beginPath();
      g.moveTo(mx+Math.cos(a)*rx*0.52,my+Math.sin(a)*ry*0.52);
      g.lineTo(mx+Math.cos(a)*rx*0.9,my+Math.sin(a)*ry*0.85);
      g.stroke();
    }
  } else {
    g.fillStyle='#180808';
    g.beginPath();g.ellipse(mx,my,rx+1,ry+1,0,0,Math.PI*2);g.fill();
  }
  g.restore();
}

function drawPlayer(x,y,flip,monster){
  g.save();g.translate(x,y);if(flip)g.scale(-1,1);
  var bob=P.moving?Math.sin(P.wf*Math.PI*0.5)*2:0;
  g.translate(0,bob);
  if(monster){
    g.fillStyle='#c0a090';g.fillRect(-10,0,20,28);
    g.fillRect(-20,4,10,5);g.fillRect(10,4,10,5);
    g.fillStyle='#d4b8a8';
    g.beginPath();g.arc(0,-10,10,0,Math.PI*2);g.fill();
    g.fillStyle='#20080c';
    var eyes=[[-4,-13],[3,-11],[0,-7]];
    for(var i=0;i<eyes.length;i++){
      g.beginPath();g.arc(eyes[i][0],eyes[i][1],2.2,0,Math.PI*2);g.fill();
    }
  } else {
    g.fillStyle='#ebebeb';
    g.beginPath();g.moveTo(-7,0);g.lineTo(7,0);g.lineTo(9,24);g.lineTo(-9,24);g.closePath();g.fill();
    g.fillRect(-5,-9,10,11);
    g.fillStyle='#f2e8d8';g.beginPath();g.arc(0,-15,7.5,0,Math.PI*2);g.fill();
    g.fillStyle='#141008';g.fillRect(-8,-21,16,10);
    g.beginPath();g.arc(0,-18,8,0,Math.PI);g.fill();
    g.fillStyle='#080808';g.fillRect(-3,-16,2,2);g.fillRect(1,-16,2,2);
  }
  g.restore();
}

function drawShadow(x,y){
  g.save();g.translate(x,y);g.globalAlpha=0.92;
  g.fillStyle='#060308';
  g.fillRect(-11,-32,22,54);g.fillRect(-26,-16,15,6);g.fillRect(11,-16,15,6);
  g.beginPath();g.arc(0,-42,13,0,Math.PI*2);g.fill();
  g.fillStyle='#ffffff';
  g.fillRect(-5,-46,4,4);g.fillRect(1,-46,4,4);
  g.globalAlpha=1;g.restore();
}

function vignette(){
  var gr=g.createRadialGradient(GW/2,GH/2,GH*0.28,GW/2,GH/2,GH*0.74);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.7)');
  g.fillStyle=gr;g.fillRect(0,0,GW,GH);
}

function drawObj(o){
  var x=o.x,y=o.y,w=o.w,h=o.h;
  if(o.type==='eye'){eyeShape(x,y,w,h,o.used);}
  else if(o.type==='carpet'){
    g.fillStyle='#1c0c0c';g.fillRect(x,y,w,h);
    g.strokeStyle='#2e1010';g.lineWidth=1;g.strokeRect(x+2,y+2,w-4,h-4);
    eyeShape(x+w/2-16,y+h/2-13,32,26);
  } else if(o.type==='window'){
    g.fillStyle='#1a0b0b';g.fillRect(x-4,y-4,w+8,h+8);
    g.fillStyle='#090505';g.fillRect(x,y,w,h);
    g.strokeStyle='#2e1010';g.lineWidth=1.5;g.strokeRect(x,y,w,h);
    g.beginPath();g.moveTo(x+w/2,y);g.lineTo(x+w/2,y+h);g.stroke();
    g.beginPath();g.moveTo(x,y+h/2);g.lineTo(x+w,y+h/2);g.stroke();
    g.globalAlpha=0.45;eyeShape(x+w/2-11,y+h/2-9,22,18);g.globalAlpha=1;
  } else if(o.type==='tv'){
    g.fillStyle='#1a0c0c';g.fillRect(x-3,y-3,w+6,h+6);
    g.fillStyle='#0d0808';g.fillRect(x,y,w,h);
    for(var i=0;i<35;i++){
      g.fillStyle='rgba(200,170,170,'+(Math.random()*0.4+0.05)+')';
      g.fillRect(x+Math.random()*w,y+Math.random()*h,2,1);
    }
  } else if(o.type==='mirror'){
    g.fillStyle='#221010';g.fillRect(x-5,y-5,w+10,h+10);
    g.fillStyle='#120a0a';g.fillRect(x,y,w,h);
    g.fillStyle='rgba(160,110,110,0.07)';g.fillRect(x+4,y+4,7,h-8);
    if(phase>=1){
      g.strokeStyle='rgba(180,100,100,0.12)';g.lineWidth=1;
      for(var i=0;i<5;i++){
        g.beginPath();
        g.moveTo(x,y+i*(h/5));
        g.quadraticCurveTo(x+w/2,y+i*(h/5)+10*Math.sin(Date.now()/500+i),x+w,y+i*(h/5));
        g.stroke();
      }
    }
  } else if(o.type==='door'){
    var open=invCount>=(o.reqC||0);
    g.fillStyle='#1e0e0e';g.fillRect(x-3,y-3,w+6,h+3);
    g.fillStyle=open?'#080404':'#160c0c';g.fillRect(x,y,w,h);
    g.strokeStyle='#2e1010';g.lineWidth=1;
    g.strokeRect(x+5,y+6,w-10,(h-16)/2);
    g.strokeRect(x+5,y+6+(h-16)/2+8,w-10,(h-16)/2);
    g.fillStyle='#3a2020';g.beginPath();g.arc(x+w-10,y+h/2,3,0,Math.PI*2);g.fill();
    if(open){g.fillStyle='rgba(120,60,60,0.15)';g.fillRect(x+1,y,3,h);}
  }
  if(!o.used||o.isExit){
    if(d2(P.x,P.y,o.x+o.w/2,o.y+o.h/2)<PREACH){
      g.fillStyle='rgba(185,90,90,0.9)';
      g.font='10px Courier New';g.textAlign='center';
      g.fillText('[ 조사 ]',o.x+o.w/2,o.y-7);
    }
  }
}

function drawRoom(){
  if(!room)return;
  g.fillStyle=room.wl;g.fillRect(0,0,GW,GH);
  g.fillStyle=room.bg;g.fillRect(8,76,GW-16,GH-190);
  g.fillStyle=room.fl;g.fillRect(0,GH-115,GW,115);
  g.strokeStyle=room.wl;g.lineWidth=2;
  g.beginPath();g.moveTo(0,GH-115);g.lineTo(GW,GH-115);g.stroke();
  g.fillStyle=room.wl;g.fillRect(0,72,GW,14);
  g.fillRect(0,GH-118,GW,6);
  if(phase===2){
    var ep=[[25,140],[305,155],[20,260],[318,280],[20,390],[314,400]];
    for(var i=0;i<ep.length;i++)eyeShape(ep[i][0],ep[i][1],36,28);
  }
  if(room.furniture){
    room.furniture.forEach(function(f){
      g.fillStyle='#1a0c0c';g.fillRect(f.x+f.ox,f.y+f.oy,f.w,f.h);
      g.strokeStyle='#2a1010';g.lineWidth=1;
      g.strokeRect(f.x+f.ox,f.y+f.oy,f.w,f.h);
    });
  }
  if(room.extra){
    room.extra.forEach(function(e){
      if(e.vis){g.globalAlpha=0.8;eyeShape(e.x,e.y,e.w,e.h);g.globalAlpha=1;}
    });
  }
  room.objects.forEach(function(o){drawObj(o);});
}

var END_EYES=[[45,135],[300,150],[30,250],[322,270],[25,390],[318,410],
              [170,100],[185,490],[80,460],[275,465],[140,300],[230,310]];

function drawTitle(){
  g.fillStyle='#050101';g.fillRect(0,0,GW,GH);
  g.globalAlpha=0.7;
  eyeShape(40,90,70,55);eyeShape(248,110,70,55);eyeShape(135,545,90,65);
  g.globalAlpha=0.28;
  eyeShape(10,280,40,32);eyeShape(310,300,40,32);
  g.globalAlpha=1;
  g.fillStyle='#c08080';g.font='bold 44px Courier New';g.textAlign='center';
  g.fillText('ROOM:EYE',GW/2,220);
  g.fillStyle='#6a2e2e';g.font='13px Courier New';
  g.fillText('타인의 시선에 갇힌 방',GW/2,252);
  g.fillStyle='rgba(100,40,40,0.55)';g.font='11px Courier New';
  g.fillText('2D 심리 인디 호러',GW/2,276);
  g.fillStyle='#220a0a';g.fillRect(100,348,160,58);
  g.strokeStyle='#601818';g.lineWidth=1.2;g.strokeRect(100,348,160,58);
  g.fillStyle='#c09090';g.font='18px Courier New';
  g.fillText('시작하기',GW/2,385);
  g.fillStyle='rgba(80,30,30,0.5)';g.font='11px Courier New';
  g.fillText('터치하여 이동 · 근체에서 탭으로 조사',GW/2,492);
  vignette();
}

function drawEnding(){
  g.fillStyle='#060202';g.fillRect(0,0,GW,GH);
  g.fillStyle='#0a0404';g.fillRect(8,76,GW-16,GH-190);
  g.fillStyle='#080303';g.fillRect(0,GH-115,GW,115);
  g.strokeStyle='#060202';g.lineWidth=2;
  g.beginPath();g.moveTo(0,GH-115);g.lineTo(GW,GH-115);g.stroke();
  g.fillStyle='#060202';g.fillRect(0,72,GW,14);
  g.fillStyle='#200e0e';g.fillRect(144,196,72,96);
  g.fillStyle='#100808';g.fillRect(148,200,64,88);
  g.fillStyle='rgba(140,90,90,0.06)';g.fillRect(152,204,7,80);
  if(mirA>0){
    g.save();g.globalAlpha=mirA;
    g.fillStyle='#c0a090';g.fillRect(166,216,28,36);
    g.fillStyle='#d4b0a0';g.beginPath();g.arc(180,213,11,0,Math.PI*2);g.fill();
    g.fillStyle='#1e0608';
    var me=[[-4,-14],[3,-12],[0,-8]];
    for(var i=0;i<me.length;i++){
      g.beginPath();g.arc(180+me[i][0],213+me[i][1],2.5,0,Math.PI*2);g.fill();
    }
    g.fillStyle='#b08878';g.fillRect(148,224,18,6);g.fillRect(194,224,18,6);
    g.restore();
  }
  if(eyeA>0){
    g.save();g.globalAlpha=eyeA*0.85;
    END_EYES.forEach(function(e){eyeShape(e[0]-18,e[1]-14,36,28);});
    g.restore();
  }
  drawPlayer(P.x,P.y,P.flip,mirA>0.6);
  vignette();
}

function draw(){
  g.clearRect(0,0,GW,GH);
  if(scene==='title'){drawTitle();return;}
  if(scene==='ending'){drawEnding();return;}
  drawRoom();
  if(SH.active)drawShadow(SH.x,SH.y);
  drawPlayer(P.x,P.y,P.flip,false);
  vignette();
  // HUD
  var labels=['관찰','왜곡','침식','엔딩'];
  g.font='10px Courier New';
  g.fillStyle='rgba(120,30,30,0.6)';g.textAlign='right';
  g.fillText('PHASE: '+labels[phase],GW-10,18);
  if(room&&room.req>0){
    g.textAlign='left';
    g.fillText('조사: '+Math.min(invCount,room.req)+'/'+room.req,10,18);
  }
}

requestAnimationFrame(tick);
</script>
