<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;align-items:center;
  position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;
  touch-action:none;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;}
#wrap{position:relative;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;}
#crt{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);}
#dlg{display:none;position:absolute;bottom:36px;left:0;right:0;z-index:20;

#dlg-text{min-height:60px;white-space:pre-wrap;}
#dlg-hint{text-align:right;font-size:10px;color:#7a2020;margin-top:4px;animation:bk 1.2s step-end infinite;}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
#fade{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;opacity:0;pointer-events:none;z-index:30;transition:opacity 0.75s;}

var DQ={lines:[],i:0,n:0,done:false,tim:null,cb:null};
function showDlg(lines,cb){
  if(!lines||!lines.length){if(cb)cb();return;}
  DQ={lines:lines,i:0,n:0,done:false,tim:null,cb:cb||null};
  dlgActive=true;dlgEl.style.display='block';
  dlgHintEl.style.opacity='0';_typeNext();
}
function _typeNext(){
  var ln=DQ.lines[DQ.i];
  dlgTextEl.textContent='';DQ.n=0;DQ.done=false;
  clearInterval(DQ.tim);
  DQ.tim=setInterval(function(){
    DQ.n++;dlgTextEl.textContent=ln.slice(0,DQ.n);
    if(DQ.n>=ln.length){clearInterval(DQ.tim);DQ.done=true;dlgHintEl.style.opacity='1';}
  },46);
}
function advanceDlg(){
  if(!dlgActive)return;
  if(!DQ.done){
    clearInterval(DQ.tim);
    dlgTextEl.textContent=DQ.lines[DQ.i];
    DQ.n=DQ.lines[DQ.i].length;DQ.done=true;dlgHintEl.style.opacity='1';
    return;
  }
  DQ.i++;
  if(DQ.i<DQ.lines.length){dlgHintEl.style.opacity='0';_typeNext();}
  else{
    clearInterval(DQ.tim);dlgActive=false;dlgEl.style.display='none';
    var cb=DQ.cb;DQ={lines:[],i:0,n:0,done:false,tim:null,cb:null};
    if(cb)cb();
  }
}

function fadeIn(cb){fadeEl.style.transition='opacity 0.75s';fadeEl.style.opacity='1';setTimeout(function(){if(cb)cb();},750);}
function fadeOut(){fadeEl.style.transition='opacity 0.75s';fadeEl.style.opacity='0';}

var room=null;

function loadRoom(n){
  phase=n;invCount=0;frozen=false;paused=false;
  SH.active=false;SH.x=-300;phaseNotif=null;
  P.x=180;P.y=490;P.tx=180;P.ty=490;P.moving=false;
  if(n<ROOMS.length){room=JSON.parse(JSON.stringify(ROOMS[n]));scene='room';}
  else startEnding();
}
function d2(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}

function tappedObj(gx,gy){
  if(!room)return null;
  var m=30;
  for(var i=0;i<room.objects.length;i++){
    var o=room.objects[i];
    if(o.used&&!o.isExit)continue;
    if(d2(P.x,P.y,o.x+o.w/2,o.y+o.h/2)<PREACH){
      if(gx>=o.x-m&&gx<=o.x+o.w+m&&gy>=o.y-m&&gy<=o.y+o.h+m)return o;
    }
  }
  return null;
}

function investigate(o){
  if(o.isExit){
    if(invCount<(o.reqC||0))showDlg(o.lines);
    else showDlg(o.openLines||o.lines,function(){goNext();});
    return;
  }
  o.used=true;invCount++;
  if(invCount>=room.req)phaseEvent();
  showDlg(o.lines);
}

function phaseEvent(){
  if(phase===0){
    if(room.extra)room.extra.forEach(function(e){e.vis=true;});
    showNotif(NOTIF_MSGS[0]);
  } else if(phase===1){
    if(!room.furniture)room.furniture=[
      {x:260,y:352,w:44,h:84,ox:0,oy:0},
      {x:78,y:400,w:38,h:54,ox:0,oy:0},
      {x:44,y:285,w:30,h:62,ox:0,oy:0}
    ];
    room.furniture.forEach(function(f){f.ox+=(Math.random()-0.5)*28;f.oy+=(Math.random()-0.5)*14;});
    showNotif(NOTIF_MSGS[1]);
    startShake();
  } else if(phase===2){
    SH.x=P.x+320;SH.y=P.y;SH.active=true;
    showNotif(NOTIF_MSGS[2]);
  }
}

function startGlitch(n){
  GLT.active=true;GLT.t=0;GLT.loaded=false;GLT.next=n;
  GLT.ca=0;GLT.shX=0;GLT.shY=0;GLT.bars=[];GLT.flash=0;
  frozen=true;
}
function updateGlitch(dt){
  if(!GLT.active)return;
  GLT.t+=dt;var t=GLT.t;
  if(t<0.45)GLT.ca=t/0.45*12;
  else if(t<0.65)GLT.ca=12+(t-0.45)/0.2*22;
  else if(t<0.85)GLT.ca=34-(t-0.65)/0.2*28;
  else if(t<1.3)GLT.ca=Math.max(0,6-(t-0.85)/0.45*6);
  else GLT.ca=0;
  GLT.flash=(t>0.62&&t<0.82)?t<0.72?Math.min(1,(t-0.62)/0.1):Math.max(0,(0.82-t)/0.1):0;
  var sh=t<0.65?Math.min(1,t/0.4)*9:(t>0.75&&t<1.2?(1-(t-0.75)/0.45)*5:0);
  GLT.shX=(Math.random()-0.5)*sh*2;GLT.shY=(Math.random()-0.5)*sh*0.5;
  if((t<0.65||(t>0.72&&t<1.15))&&Math.random()<0.5){
    for(var i=0,bn=Math.floor(Math.random()*3)+1;i<bn;i++)
      GLT.bars.push({y:Math.random()*GH,h:Math.random()*14+2,sh:(Math.random()-0.5)*50,life:0.05+Math.random()*0.07});
  }
  GLT.bars=GLT.bars.filter(function(b){b.life-=dt;return b.life>0;});
  if(!GLT.loaded&&t>=GLT.loadAt){GLT.loaded=true;loadRoom(GLT.next);frozen=true;}
  if(t>=GLT.dur){GLT.active=false;GLT.ca=0;GLT.bars=[];GLT.flash=0;GLT.shX=0;GLT.shY=0;frozen=false;}
}
function applyGlitchEffect(){
  var ca=Math.round(GLT.ca),shX=Math.round(GLT.shX),shY=Math.round(GLT.shY);
  if(GLT.bars.length>0){
    GLT.bars.forEach(function(b){
      var sy=Math.round(b.y),bh=Math.round(b.h);
      if(sy<0){bh+=sy;sy=0;}if(sy+bh>GH)bh=GH-sy;if(bh<=0)return;
      try{var id=offG.getImageData(0,sy,GW,bh);offG.putImageData(id,Math.round(b.sh),sy);}catch(e){}
    });
  }
  if(ca>0){
    var sd=offG.getImageData(0,0,GW,GH).data,od=_gBuf;
    for(var y=0;y<GH;y++){
      for(var x=0;x<GW;x++){
        var i=(y*GW+x)*4;
        var rx=x-ca<0?0:x-ca;od[i]=sd[(y*GW+rx)*4];
        od[i+1]=sd[i+1];
        var bx=x+ca>=GW?GW-1:x+ca;od[i+2]=sd[(y*GW+bx)*4+2];
        od[i+3]=255;
      }
    }
    g.putImageData(new ImageData(od,GW,GH),shX,shY);
  } else {
    g.drawImage(offCv,shX,shY);
  }
  if(GLT.flash>0){
    g.fillStyle=GLT.t<0.72?'rgba(160,12,12,'+(GLT.flash*0.88)+')':'rgba(0,0,0,'+(GLT.flash*0.95)+')';
    g.fillRect(0,0,GW,GH);
  }
  if(GLT.t<0.65||GLT.t>0.72){
    var na=Math.max(0,(0.65-Math.abs(GLT.t-0.685))/0.65)*0.22;
    if(na>0.02){g.fillStyle='rgba(200,80,80,'+na+')';for(var n=0;n<6;n++){g.fillRect(0,Math.floor(Math.random()*GH),GW,1);}}
  }
}
function goNext(){startGlitch(phase+1);}

function startShake(){
  SHAKE.active=true;SHAKE.t=0;SHAKE.x=0;SHAKE.y=0;
}
function updateShake(dt){
  if(!SHAKE.active)return;
  SHAKE.t+=dt;
  var intensity=Math.max(0,(1-SHAKE.t/SHAKE.dur))*SHAKE.str;
  SHAKE.x=(Math.random()-0.5)*intensity*2;
  SHAKE.y=(Math.random()-0.5)*intensity*0.8;
  if(SHAKE.t>=SHAKE.dur){SHAKE.active=false;SHAKE.x=0;SHAKE.y=0;}
}

function shadowCatch(){
  SH.active=false;frozen=true;
  showDlg(['너도 결국 보여지고 싶었잠아.','…'],function(){fadeIn(function(){loadRoom(2);setTimeout(fadeOut,100);});});
}

var endStep=0,endT=0,mirA=0,eyeA=0,endDone=false;
function startEnding(){
  scene='ending';endStep=0;endT=0;mirA=0;eyeA=0;endDone=false;
  P.x=180;P.y=510;P.tx=180;P.ty=375;P.moving=true;P.flip=false;
}
function updateEnding(dt){
  endT+=dt;
  if(endStep===0&&d2(P.x,P.y,180,375)<8){P.moving=false;endStep=1;endT=0;}
  if(endStep===1&&endT>1.0){endStep=2;endT=0;}
  if(endStep===2){mirA=Math.min(1,endT/1.8);if(mirA>=1){endStep=3;endT=0;}}
  if(endStep===3){
    eyeA=Math.min(1,endT/1.2);
    if(eyeA>=1&&!endDone){
      endDone=true;endStep=4;
      setTimeout(function(){
        showDlg(['거울 속 내가 웃고 있다.','나는 웃지 않았다.','모두가 나를 보고 있다.','이제야 모두가 날 봐준다.'],
          function(){setTimeout(function(){fadeIn(function(){scene='title';phase=0;setTimeout(fadeOut,100);});},1400);});
      },600);
    }
  }
}

];
function drawBloods(alpha){
  if(alpha<=0)return;
  g.save();g.globalAlpha=Math.min(1,alpha)*0.92;
  BLOOD.forEach(function(s){
    g.fillStyle='rgba(28,0,0,0.4)';
    g.beginPath();g.ellipse(s.x+2,s.y+3,s.r+3,s.r*0.7+2,0,0,Math.PI*2);g.fill();
    g.fillStyle='#5c0a0a';
    g.beginPath();g.ellipse(s.x,s.y,s.r,s.r*0.72,0,0,Math.PI*2);g.fill();
    g.fillStyle='#7c1515';
    g.beginPath();g.arc(s.x-s.r*0.2,s.y-s.r*0.15,s.r*0.5,0,Math.PI*2);g.fill();
    g.fillStyle='rgba(120,25,25,0.5)';
    g.beginPath();g.arc(s.x-s.r*0.3,s.y-s.r*0.22,s.r*0.22,0,Math.PI*2);g.fill();
    s.drips.forEach(function(d){
      var tx=s.x+d[0],ty0=s.y+s.r*0.35,len=d[1];
      g.fillStyle='#480606';
      g.beginPath();
      g.moveTo(tx-2.5,ty0);g.lineTo(tx+2.5,ty0);
      g.lineTo(tx+1.5,ty0+len);g.lineTo(tx-1.5,ty0+len);
      g.fill();
      g.beginPath();g.arc(tx,ty0+len,3.5,0,Math.PI*2);g.fill();
    });
    g.fillStyle='rgba(72,6,6,0.85)';
    s.dots.forEach(function(d){
      g.beginPath();g.arc(s.x+d[0],s.y+d[1],Math.min(3.5,1.5+Math.abs(d[0]+d[1])*0.04),0,Math.PI*2);g.fill();
    });
  });
  g.restore();
}

var lastT=0;
function tick(ts){
  var dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  updateGlitch(dt);
  updateShake(dt);
  if(!paused){
    if(scene==='room'||scene==='ending'){
      updatePlayer(dt);
      if(scene==='room'&&SH.active)updateShadow(dt);
      if(scene==='ending')updateEnding(dt);
    }
    if(phaseNotif){phaseNotif.t+=dt;if(phaseNotif.t>=phaseNotif.max)phaseNotif=null;}
  }
  draw();
  requestAnimationFrame(tick);
}
function updatePlayer(dt){
  if(frozen||!P.moving)return;
  var dx=P.tx-P.x,dy=P.ty-P.y,dd=Math.hypot(dx,dy);
  if(dd<5){P.moving=false;return;}
  var s=PSPD*dt;
  P.x+=dx/dd*Math.min(s,dd);P.y+=dy/dd*Math.min(s,dd);
  P.x=Math.max(18,Math.min(GW-18,P.x));
  P.y=Math.max(HH+96,Math.min(GH-PBH-30,P.y));
  P.wt+=dt;if(P.wt>0.18){P.wf=(P.wf+1)%4;P.wt=0;}
}
function updateShadow(dt){
  var dx=P.x-SH.x,dy=P.y-SH.y,dd=Math.hypot(dx,dy);
  if(dd<24){shadowCatch();return;}
  SH.x+=dx/dd*SH.spd*dt;SH.y+=dy/dd*SH.spd*dt;
}

function toGame(e){
  var r=cv.getBoundingClientRect(),sx=GW/r.width,sy=GH/r.height;
  var t=e.changedTouches?e.changedTouches[0]:e;
  return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
}

function onTap(gx,gy){
  if(scene==='title'){
    if(inR(gx,gy,SICON)){showSettings=!showSettings;return;}
    if(showSettings){showSettings=false;return;}
    if(gx>100&&gx<260&&gy>345&&gy<410){fadeIn(function(){loadRoom(0);setTimeout(fadeOut,100);});}
    return;
  }
  if(paused){
    if(inR(gx,gy,RBTN)){paused=false;return;}
    if(inR(gx,gy,STBTN)){paused=false;fadeIn(function(){loadRoom(0);setTimeout(fadeOut,100);});return;}
    if(inR(gx,gy,TTBTN)){paused=false;fadeIn(function(){scene='title';phase=0;setTimeout(fadeOut,100);});return;}
    return;
  }
  if((scene==='room'||scene==='ending')&&!GLT.active&&inR(gx,gy,PBTN)){paused=true;return;}
  if(dlgActive){advanceDlg();return;}
  if(scene==='room'&&!frozen){
    var o=tappedObj(gx,gy);
    if(o){investigate(o);return;}
    P.tx=gx;P.ty=gy;P.moving=true;P.flip=gx<P.x;
  }
}

function rr(x,y,w,h,r){
  g.beginPath();g.moveTo(x+r,y);g.lineTo(x+w-r,y);g.arcTo(x+w,y,x+w,y+r,r);
  g.lineTo(x+w,y+h-r);g.arcTo(x+w,y+h,x+w-r,y+h,r);
  g.lineTo(x+r,y+h);g.arcTo(x,y+h,x,y+h-r,r);
  g.lineTo(x,y+r);g.arcTo(x,y,x+r,y,r);g.closePath();
}
function eyeShape(x,y,w,h,closed){
  var mx=x+w/2,my=y+h/2,rx=w/2,ry=h/2.2;
  g.save();

  if(!closed){
    g.fillStyle='#4a0a0a';g.beginPath();g.ellipse(mx,my,rx*0.5,ry*0.68,0,0,Math.PI*2);g.fill();
    g.fillStyle='#040101';g.beginPath();g.ellipse(mx,my,rx*0.2,ry*0.32,0,0,Math.PI*2);g.fill();
    g.strokeStyle='rgba(160,40,40,0.35)';g.lineWidth=0.7;
    for(var i=0;i<5;i++){var a=i/5*Math.PI*2;g.beginPath();g.moveTo(mx+Math.cos(a)*rx*0.52,my+Math.sin(a)*ry*0.52);g.lineTo(mx+Math.cos(a)*rx*0.9,my+Math.sin(a)*ry*0.85);g.stroke();}
  } else {g.fillStyle='#180808';g.beginPath();g.ellipse(mx,my,rx+1,ry+1,0,0,Math.PI*2);g.fill();}
  g.restore();
}

  for(var i=0;i<8;i++){var a=i/8*Math.PI*2;g.fillStyle='rgba(180,65,65,0.65)';g.fillRect(gx+Math.cos(a)*11-2,gy+Math.sin(a)*11-2,4,4);}
  g.fillStyle='rgba(6,1,1,0.92)';g.beginPath();g.arc(gx,gy,5,0,Math.PI*2);g.fill();
  if(showSettings){
    var spx=18,spy=48,spw=GW-36,sph=192;
    g.fillStyle='rgba(6,1,1,0.97)';rr(spx,spy,spw,sph,8);g.fill();
    g.strokeStyle='rgba(175,38,38,0.58)';g.lineWidth=1.5;rr(spx,spy,spw,sph,8);g.stroke();
    g.fillStyle='#c06060';g.font='bold 13px Courier New';g.textAlign='center';g.fillText('사운드 설정',GW/2,spy+24);
    g.strokeStyle='rgba(120,35,35,0.35)';g.lineWidth=1;g.beginPath();g.moveTo(spx+18,spy+34);g.lineTo(spx+spw-18,spy+34);g.stroke();
    g.fillStyle='rgba(145,58,58,0.8)';g.font='11px Courier New';g.textAlign='left';
    g.fillText('BGM',TBGMT.x-42,TBGMT.y+5);drawSlider(TBGMT,bgmVol);
    g.fillText('SFX',TSFXT.x-42,TSFXT.y+5);drawSlider(TSFXT,sfxVol);
    g.fillStyle='rgba(100,45,45,0.6)';g.font='10px Courier New';g.textAlign='center';
    g.fillText('(탭하여 닫기)',GW/2,spy+sph-12);
  }
  g.fillStyle='rgba(75,28,28,0.5)';g.font='10px Courier New';g.textAlign='center';
  g.fillText('오브젝트 탭 → 조사  ·  빈 곳 탭 → 이동',GW/2,GH-16);
  vignette();
}

var END_EYES=[[45,135],[300,150],[30,250],[322,270],[25,390],[318,410],[170,100],[185,490],[80,460],[275,465],[140,300],[230,310]];
function drawEnding(){
  g.fillStyle='#060202';g.fillRect(0,0,GW,GH);
  g.fillStyle='#0a0404';g.fillRect(8,HH+10,GW-16,GH-HH-10-PBH-88);
  g.fillStyle='#080303';g.fillRect(0,GH-PBH-88,GW,88);
  g.fillStyle='#060202';g.fillRect(0,HH+8,GW,8);
  g.fillStyle='#200e0e';g.fillRect(144,196,72,96);
  g.fillStyle='#100808';g.fillRect(148,200,64,88);
  g.fillStyle='rgba(140,90,90,0.06)';g.fillRect(152,204,7,80);
  if(mirA>0){
    g.save();g.globalAlpha=mirA;
    g.fillStyle='#c0a090';g.fillRect(166,216,28,36);
    g.fillStyle='#d4b0a0';g.beginPath();g.arc(180,213,11,0,Math.PI*2);g.fill();
    g.fillStyle='#1e0608';
    [[-4,-14],[3,-12],[0,-8]].forEach(function(e){g.beginPath();g.arc(180+e[0],213+e[1],2.5,0,Math.PI*2);g.fill();});
    g.fillStyle='#b08878';g.fillRect(148,224,18,6);g.fillRect(194,224,18,6);
    g.restore();
  }
  if(eyeA>0){g.save();g.globalAlpha=eyeA*0.85;END_EYES.forEach(function(e){eyeShape(e[0]-18,e[1]-14,36,28);});g.restore();}
  if(eyeA>0.3){drawBloods((eyeA-0.3)/0.7);}
  drawPlayer(P.x,P.y,P.flip,mirA>0.6);
  vignette();drawHUD();drawPhaseBar();
  if(paused)drawPause();
}

function draw(){
  var realG=null;
  if(GLT.active){realG=g;g=offG;offG.clearRect(0,0,GW,GH);}
  else{g.clearRect(0,0,GW,GH);}
  var shaking=SHAKE.active&&!GLT.active;
  if(shaking){g.save();g.translate(Math.round(SHAKE.x),Math.round(SHAKE.y));}
  if(scene==='title'){drawTitle();}
  else if(scene==='ending'){drawEnding();}
  else{
    drawRoom();
    if(SH.active)drawShadow(SH.x,SH.y);
    drawPlayer(P.x,P.y,P.flip,false);
    vignette();drawNotif();drawHUD();drawPhaseBar();
    if(paused)drawPause();
  }
  if(shaking){g.restore();}
  if(GLT.active){g=realG;realG.clearRect(0,0,GW,GH);applyGlitchEffect();}
}

requestAnimationFrame(tick);
</script>
